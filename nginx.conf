server {
    listen 8188;
    server_name _;
    client_max_body_size 0;

    # Increase timeouts for long-running ComfyUI operations
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    # Embedded file browser at /files/ (filebrowser.org)
    # Allows uploading/downloading models, viewing logs, editing configs
    # while the pod is live, without needing SSH or rebuilds.
    location /files/ {
        proxy_pass http://127.0.0.1:8090/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8189;

        proxy_http_version 1.1;

        # WebSocket upgrade — required for ComfyUI real-time updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info to ComfyUI
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
